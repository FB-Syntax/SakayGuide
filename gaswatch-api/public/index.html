<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GasWatch API Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">GasWatch API Dashboard</h1>
      <div class="header-controls">
        <button id="themeToggle" class="btn btn-icon" aria-label="Toggle dark mode">
          <span class="icon-moon">&#9790;</span>
          <span class="icon-sun" style="display:none">&#9728;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="cards" id="statCards">
      <div class="card" data-stat="totalStations">
        <div class="card-label">Total Stations</div>
        <div class="card-value" id="statTotalStations">--</div>
      </div>
      <div class="card" data-stat="totalBrands">
        <div class="card-label">Total Brands</div>
        <div class="card-value" id="statTotalBrands">--</div>
      </div>
      <div class="card" data-stat="totalAreas">
        <div class="card-label">Total Areas</div>
        <div class="card-value" id="statTotalAreas">--</div>
      </div>
      <div class="card" data-stat="lastRefresh">
        <div class="card-label">Last Refresh</div>
        <div class="card-value card-value--small" id="statLastRefresh">--</div>
      </div>
      <div class="card" data-stat="cacheAge">
        <div class="card-label">Cache Age</div>
        <div class="card-value" id="statCacheAge">--</div>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-row">
        <div class="toolbar-group">
          <button id="refreshBtn" class="btn btn-primary">
            <span class="spinner-small" style="display:none"></span>
            Refresh Data
          </button>
          <button id="showAdvisoriesBtn" class="btn btn-secondary">Advisories</button>
          <button id="showHistoryBtn" class="btn btn-secondary">Price History</button>
        </div>
        <div class="toolbar-group">
          <div class="search-wrapper">
            <input type="text" id="searchInput" class="input" placeholder="Search station name..." autocomplete="off">
          </div>
        </div>
      </div>
      <div class="toolbar-row">
        <div class="toolbar-group">
          <label class="filter-label">
            Brand
            <select id="brandFilter" class="input">
              <option value="">All Brands</option>
            </select>
          </label>
          <label class="filter-label">
            Area
            <select id="areaFilter" class="input">
              <option value="">All Areas</option>
            </select>
          </label>
        </div>
      </div>
    </section>

    <section class="table-section">
      <div class="table-wrapper">
        <table class="table" id="stationTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Brand</th>
              <th>Station</th>
              <th>Area</th>
              <th class="numeric">Diesel</th>
              <th class="numeric">Prem. Diesel</th>
              <th class="numeric">Unleaded</th>
              <th class="numeric">Prem. 95</th>
              <th class="numeric">Prem. 97</th>
              <th class="numeric">Kerosene</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="10" class="table-empty">Loading stations...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination">
        <button id="prevPageBtn" class="btn btn-secondary" disabled>Previous</button>
        <span id="pageInfo" class="page-info">Page 1 of 1</span>
        <button id="nextPageBtn" class="btn btn-secondary" disabled>Next</button>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="stationModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Station</h2>
        <button class="btn btn-icon modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading-spinner" id="modalSpinner"></div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
